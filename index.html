<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell → JSON 변환기</title>

    <link rel="stylesheet" href="style.css">

    <!-- PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">

    <h1>Cell → JSON 변환기</h1>
    <p class="subtitle">
        Cell 파일을 업로드한 후 각 항목에 맞는 열을 선택하세요.
    </p>

    <!-- 파일 업로드 -->
    <div class="card">

        <h2>1. Cell 업로드</h2>

        <input
            type="file"
            id="csvFile"
            accept=".Cell"
        >

        <p id="fileName" class="filename">
            선택된 파일 없음
        </p>

    </div>

    <!-- 열 선택 -->
    <div class="card" id="mappingSection" style="display:none;">

        <h2>2. 열 선택</h2>

        <div class="mapping">

            <label>
                중대
                <select id="companySelect">
                    <Option value="9">9중대</Option>
                    <Option value="10">10중대</Option>
                    <Option value="11">11중대</Option>
                    <Option value="12">12중대</Option>
                </select>
            </label>

            <label>
                교번 열
                <select id="numberSelect"></select>
            </label>

            <label>
                이름 열
                <select id="nameSelect"></select>
            </label>

            <label>
                생년월일 열
                <select id="brithSelect"></select>
            </label>
        </div>

        <button id="convertBtn">
            JSON 변환
        </button>

    </div>

    <!-- 결과 -->
    <div class="card" id="resultSection" style="display:none;">

        <h2>3. 변환 완료</h2>

        <p id="resultInfo"></p>

        <button id="downloadBtn">
            data.json 다운로드
        </button>

    </div>

    <!-- 미리보기 -->
    <div class="card" id="previewSection" style="display:none;">

        <h2>JSON 미리보기</h2>

        <pre id="preview"></pre>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
